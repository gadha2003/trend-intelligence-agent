name: Trend Agent Scheduler

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:

    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Step 2: Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt

    # Step 4: Run your agent
    - name: Run scheduler
      run: python scheduler.py
      env:
        EMAIL: ${{ secrets.EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    # Step 5: Commit and push updated database (FIXED)
    - name: Commit and push updated database
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        # Pull latest changes to avoid conflict
        git pull origin main --rebase

        # Add database
        git add trends.db

        # Commit only if changed
        git diff --staged --quiet || git commit -m "Auto-update trends database"

        # Push
        git push origin main
