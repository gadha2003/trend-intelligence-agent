name: Trend Agent Scheduler

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:

    runs-on: ubuntu-latest

    steps:

    # Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    # Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # Run scheduler
    - name: Run scheduler
      run: python scheduler.py
      env:
        EMAIL: ${{ secrets.EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    # Commit and push database safely
    - name: Commit updated trends.db
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update trends database"
        file_pattern: trends.db
        branch: main
