name: Trend Agent Scheduler

on:
  schedule:
    - cron: '0 */3 * * *'   # runs every 3 hours
  workflow_dispatch:        # allows manual run

permissions:
  contents: write           # REQUIRED for pushing trends.db

jobs:
  run-agent:

    runs-on: ubuntu-latest

    steps:

    # Step 1: Checkout your repository
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Step 2: Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run your multi-agent scheduler
    - name: Run scheduler
      run: python scheduler.py
      env:
        EMAIL: ${{ secrets.EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    # Step 5: Commit and push updated database safely
    - name: Commit and push trends.db
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update trends database"
        file_pattern: trends.db
        push_options: '--force'
