name: AI Trend Intelligence Scheduler

on:
  schedule:
    - cron: "0 */3 * * *"   # Runs every 3 hours
  workflow_dispatch:

# Prevent multiple runs at same time
concurrency:
  group: trend-agent
  cancel-in-progress: true

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    # 1️⃣ Checkout Repository
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 3️⃣ Install Dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4️⃣ Run Trend Intelligence Agent
    - name: Run scheduler
      run: python scheduler.py
      env:
        EMAIL: ${{ secrets.EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    # 5️⃣ Commit Updated Database (NO git pull here)
    - name: Commit updated database
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        git add trends.db

        git diff --cached --quiet || git commit -m "Auto-update trends database"

        git push origin main
